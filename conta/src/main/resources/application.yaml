spring:
  application:
    name: conta

  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/conta}
    username: ${DATASOURCE_USER:conta}
    password: ${DATASOURCE_PWD:pwdconta}
    driver-class-name: ${DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: update   # create, create-drop, validate, none, update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect